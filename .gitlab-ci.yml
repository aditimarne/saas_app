stages:
  - install
  - lint
  - build

install-dependencies:
  stage: install
  image: node:18
  script:
    - echo "Installing dependencies..."
    - npm install
  cache:
    paths:
      - node_modules/

lint-code:
  stage: lint
  image: node:18
  script:
    - echo "Checking code quality..."
    - npm run lint || echo "Lint completed"
  cache:
    paths:
      - node_modules/

build-app:
  stage: build
  image: node:18
  script:
    - echo "Building Next.js application..."
    - npm run build
  cache:
    paths:
      - node_modules/
      - .next/
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour