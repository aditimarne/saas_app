apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saas-app
  template:
    metadata:
      labels:
        app: saas-app
    spec:
      containers:
      - name: saas-app
        image: saas-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: saas-service
spec:
  selector:
    app: saas-app
  ports:
  - port: 80
    targetPort: 3000
  type: NodePort